<style>
  :root{
    --bg: #12161f;
    --panel: #1a2030;
    --panel-2: #212a3d;
    --line: #2c3650;
    --text: #eef1f7;
    --sub: #93a0bd;
    --amber: #f2b807;
    --amber-dim: #7a640a;
    --green: #4ade80;
    --red: #f87171;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-tap-highlight-color:transparent;}
  .mono{font-family:"JetBrains Mono","SF Mono",Consolas,monospace; font-variant-numeric: tabular-nums;}

  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  header{padding:18px 16px 14px;position:sticky;top:0;background:linear-gradient(180deg, var(--bg) 80%, transparent);z-index:10;}
  .brand{display:flex;align-items:baseline;gap:8px;}
  .brand .badge{background:var(--amber);color:#1a1400;font-weight:800;font-size:12px;letter-spacing:.06em;
    padding:2px 8px;border-radius:6px;}
  .brand h1{font-size:20px;margin:0;font-weight:800;letter-spacing:.02em;}
  .brand .sub{color:var(--sub);font-size:12px;margin-top:2px;}

  nav.tabs{display:flex;gap:4px;margin:14px 0 0;background:var(--panel);border-radius:12px;padding:4px;border:1px solid var(--line);}
  nav.tabs button{flex:1;border:none;background:transparent;color:var(--sub);padding:10px 6px;border-radius:9px;
    font-size:13px;font-weight:700;cursor:pointer;transition:.15s;}
  nav.tabs button.active{background:var(--amber);color:#1a1400;}

  main{flex:1;padding:16px;padding-bottom:100px;}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 16px;margin-bottom:12px;}
  .card h2{font-size:13px;color:var(--amber);letter-spacing:.05em;margin:0 0 12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;}
  .card h2 .n{background:var(--panel-2);color:var(--sub);font-size:10px;padding:1px 6px;border-radius:5px;}

  .row{display:flex;gap:10px;margin-bottom:10px;}
  .row > div{flex:1;min-width:0;}
  label{display:block;font-size:11.5px;color:var(--sub);margin-bottom:5px;font-weight:600;}
  input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:10px 11px;font-size:15px;outline:none;font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:var(--amber);}
  textarea{resize:vertical;min-height:60px;}

  .meter{background:#0b0e15;border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
  .meter .label{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.04em;}
  .meter .val{font-size:22px;font-weight:700;color:var(--amber);}
  .meter .val.green{color:var(--green);}
  .meter .unit{font-size:12px;color:var(--sub);margin-left:4px;}

  table.trips{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.trips th{text-align:left;color:var(--sub);font-weight:700;padding:4px 4px;border-bottom:1px solid var(--line);font-size:11px;}
  table.trips td{padding:4px 3px;border-bottom:1px solid var(--line);}
  table.trips input,table.trips select{padding:6px 6px;font-size:12.5px;border-radius:6px;}
  .trip-row{position:relative;}
  .del-trip{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:2px 6px;}
  .add-trip{width:100%;margin-top:8px;background:var(--panel-2);border:1px dashed var(--line);color:var(--sub);
    padding:9px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;}
  .add-trip:hover{color:var(--amber);border-color:var(--amber-dim);}

  .payrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .payrow:last-child{border-bottom:none;}
  .payrow input{width:120px;text-align:right;}

  .save-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg, var(--bg) 60%, transparent);padding:14px 16px 20px;z-index:20;}
  .save-bar .inner{max-width:640px;margin:0 auto;display:flex;gap:10px;}
  .btn{border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;flex:1;}
  .btn-primary{background:var(--amber);color:#1a1400;}
  .btn-primary:active{transform:scale(.98);}
  .btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line);}

  .history-item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .history-item:active{background:var(--panel-2);}
  .history-item .d{font-weight:800;font-size:14px;}
  .history-item .m{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .history-item .r{text-align:right;}
  .history-item .r .amt{font-size:16px;font-weight:800;color:var(--amber);}
  .history-item .r .km{font-size:11px;color:var(--sub);}

  .empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:13.5px;line-height:1.7;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .stat .l{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:6px;}
  .stat .v{font-size:22px;font-weight:800;color:var(--amber);}
  .stat .v.green{color:var(--green);}
  .stat .u{font-size:11px;color:var(--sub);}

  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .month-nav button{background:var(--panel-2);border:1px solid var(--line);color:var(--text);width:36px;height:36px;border-radius:9px;font-size:16px;cursor:pointer;}
  .month-nav .cur{font-weight:800;font-size:15px;}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#062b13;
    padding:10px 18px;border-radius:10px;font-weight:700;font-size:13.5px;z-index:100;opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--panel);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:640px;max-height:80vh;overflow:auto;}
  .modal h3{margin:0 0 10px;font-size:15px;}
  .modal .actions{display:flex;gap:10px;margin-top:16px;}
  .modal .btn{padding:12px;font-size:14px;}

  ::placeholder{color:#4c5877;}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%2393a0bd'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:26px;}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <span class="badge">TAXI</span>
      <h1>乗務日報</h1>
    </div>
    <div class="sub">記録は自動で保存されます</div>
    <nav class="tabs">
      <button data-tab="entry" class="active">入力</button>
      <button data-tab="history">履歴</button>
      <button data-tab="summary">集計</button>
    </nav>
  </header>

  <main id="main"></main>

  <div class="save-bar" id="saveBar">
    <div class="inner">
      <button class="btn btn-ghost" id="newBtn">新規日報</button>
      <button class="btn btn-primary" id="saveBtn">この内容を保存</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="modalCancel">キャンセル</button>
      <button class="btn btn-primary" id="modalConfirm" style="background:var(--red);color:#fff;">削除する</button>
    </div>
  </div>
</div>

<script>
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const todayStr = ()=> new Date().toISOString().slice(0,10);
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const yen = n => (n||0).toLocaleString('ja-JP');
const dow = d => ['日','月','火','水','木','金','土'][new Date(d+'T00:00:00').getDay()];

function blankEntry(){
  return {
    id: uid(),
    date: todayStr(),
    driverName: '',
    carNumber: '',
    weather: '',
    startTime: '', startMeter: '',
    endTime: '', endMeter: '',
    breakStart: '', breakEnd: '',
    alcoholCheck: '',
    trips: [ blankTrip() ],
    cash: '', card: '', emoney: '', ticket: '', pickupFee: '',
    fuelAmount: '', fuelCost: '',
    notes: ''
  };
}
function blankTrip(){
  return { id: uid(), pickupTime:'', pickupLoc:'', dropTime:'', dropLoc:'', distance:'', pax:'', fare:'', pay:'現金' };
}

let current = blankEntry();
let activeTab = 'entry';
let historyCache = [];
let summaryMonth = todayStr().slice(0,7); // YYYY-MM

// ---------- storage helpers (browser localStorage) ----------
async function saveEntry(entry){
  const key = 'nippou:'+entry.date+'_'+entry.id;
  localStorage.setItem(key, JSON.stringify(entry));
}
async function deleteEntry(entry){
  const key = 'nippou:'+entry.date+'_'+entry.id;
  localStorage.removeItem(key);
}
async function loadAllEntries(){
  const out = [];
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf('nippou:')===0){
      try{
        const v = localStorage.getItem(k);
        if(v) out.push(JSON.parse(v));
      }catch(e){}
    }
  }
  out.sort((a,b)=> (b.date+b.id).localeCompare(a.date+a.id));
  return out;
}

// ---------- calculations ----------
function totalDistance(e){
  const s=parseFloat(e.startMeter), en=parseFloat(e.endMeter);
  if(isNaN(s)||isNaN(en)) return null;
  return Math.max(0, en-s);
}
function tripsFareSum(e){
  return e.trips.reduce((s,t)=> s+(parseFloat(t.fare)||0), 0);
}
function tripsSumByPay(e, pay){
  return e.trips.filter(t=>t.pay===pay).reduce((s,t)=> s+(parseFloat(t.fare)||0),0);
}
function totalRevenue(e){
  return (parseFloat(e.cash)||0)+(parseFloat(e.card)||0)+(parseFloat(e.emoney)||0)+(parseFloat(e.ticket)||0)+(parseFloat(e.pickupFee)||0);
}

// ---------- render: entry form ----------
function renderEntry(){
  const e = current;
  const dist = totalDistance(e);
  const fareSum = tripsFareSum(e);

  const html = `
    <div class="card">
      <h2>基本情報</h2>
      <div class="row">
        <div>
          <label>日付</label>
          <input type="date" id="f_date" value="${e.date}">
        </div>
        <div>
          <label>天候</label>
          <select id="f_weather">
            ${['','晴','曇','雨','雪'].map(w=>`<option ${e.weather===w?'selected':''}>${w||'選択'}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>氏名</label>
          <input type="text" id="f_driver" value="${e.driverName}" placeholder="運転者氏名">
        </div>
        <div>
          <label>車両番号 / 社番</label>
          <input type="text" id="f_car" value="${e.carNumber}" placeholder="例: 松本500 あ 12-34">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>乗務前 / 乗務後 <span class="n">出退勤・メーター</span></h2>
      <div class="row">
        <div>
          <label>出庫時刻</label>
          <input type="time" id="f_start" value="${e.startTime}">
        </div>
        <div>
          <label>帰庫時刻</label>
          <input type="time" id="f_end" value="${e.endTime}">
        </div>
      </div>
      <div class="row">
        <div>
          <label>出庫時 走行距離計 (km)</label>
          <input type="number" inputmode="decimal" id="f_startMeter" value="${e.startMeter}" placeholder="0">
        </div>
        <div>
          <label>帰庫時 走行距離計 (km)</label>
          <input type="number" inputmode="decimal" id="f_endMeter" value="${e.endMeter}" placeholder="0">
        </div>
      </div>
      <div class="meter">
        <span class="label">走行距離 合計</span>
        <span><span class="val">${dist!==null? dist.toLocaleString('ja-JP'): '--'}</span><span class="unit">km</span></span>
      </div>
      <div class="row" style="margin-top:10px;">
        <div>
          <label>休憩開始</label>
          <input type="time" id="f_breakStart" value="${e.breakStart}">
        </div>
        <div>
          <label>休憩終了</label>
          <input type="time" id="f_breakEnd" value="${e.breakEnd}">
        </div>
      </div>
      <div class="row">
        <div>
          <label>アルコールチェック値</label>
          <input type="text" id="f_alcohol" value="${e.alcoholCheck}" placeholder="0.00 mg">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>乗車記録 <span class="n">${e.trips.length}件</span></h2>
      <table class="trips">
        <thead><tr>
          <th style="width:14%">乗車</th><th style="width:20%">乗車地</th>
          <th style="width:14%">降車</th><th style="width:20%">降車地</th>
          <th style="width:12%">料金</th><th style="width:14%">支払</th><th></th>
        </tr></thead>
        <tbody>
        ${e.trips.map((t,i)=>`
          <tr class="trip-row" data-i="${i}">
            <td><input type="time" class="t-pickupTime" value="${t.pickupTime}"></td>
            <td><input type="text" class="t-pickupLoc" value="${t.pickupLoc}" placeholder="乗車地"></td>
            <td><input type="time" class="t-dropTime" value="${t.dropTime}"></td>
            <td><input type="text" class="t-dropLoc" value="${t.dropLoc}" placeholder="降車地"></td>
            <td><input type="number" inputmode="decimal" class="t-fare" value="${t.fare}" placeholder="0"></td>
            <td>
              <select class="t-pay">
                ${['現金','カード','電子マネー','チケット','迎車'].map(p=>`<option ${t.pay===p?'selected':''}>${p}</option>`).join('')}
              </select>
            </td>
            <td><button class="del-trip" data-i="${i}">✕</button></td>
          </tr>
        `).join('')}
        </tbody>
      </table>
      <button class="add-trip" id="addTrip">＋ 乗車記録を追加</button>
      <div class="meter" style="margin-top:10px;">
        <span class="label">乗車記録 合計</span>
        <span><span class="val green">¥${yen(fareSum)}</span></span>
      </div>
    </div>

    <div class="card">
      <h2>売上内訳 <span class="n">自動集計あり</span></h2>
      <div class="payrow"><span>現金</span><input type="number" inputmode="decimal" id="f_cash" value="${e.cash}" placeholder="${tripsSumByPay(e,'現金')||0}"></div>
      <div class="payrow"><span>カード</span><input type="number" inputmode="decimal" id="f_card" value="${e.card}" placeholder="${tripsSumByPay(e,'カード')||0}"></div>
      <div class="payrow"><span>電子マネー</span><input type="number" inputmode="decimal" id="f_emoney" value="${e.emoney}" placeholder="${tripsSumByPay(e,'電子マネー')||0}"></div>
      <div class="payrow"><span>チケット</span><input type="number" inputmode="decimal" id="f_ticket" value="${e.ticket}" placeholder="${tripsSumByPay(e,'チケット')||0}"></div>
      <div class="payrow"><span>迎車料金</span><input type="number" inputmode="decimal" id="f_pickupFee" value="${e.pickupFee}" placeholder="${tripsSumByPay(e,'迎車')||0}"></div>
      <button class="add-trip" id="fillFromTrips" style="margin-top:10px;">乗車記録から自動入力</button>
      <div class="meter" style="margin-top:10px;">
        <span class="label">水揚げ合計</span>
        <span><span class="val">¥${yen(totalRevenue(e))}</span></span>
      </div>
    </div>

    <div class="card">
      <h2>給油</h2>
      <div class="row">
        <div>
          <label>給油量 (L)</label>
          <input type="number" inputmode="decimal" id="f_fuelAmount" value="${e.fuelAmount}" placeholder="0">
        </div>
        <div>
          <label>給油代 (円)</label>
          <input type="number" inputmode="decimal" id="f_fuelCost" value="${e.fuelCost}" placeholder="0">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>特記事項</h2>
      <textarea id="f_notes" placeholder="事故・故障・お客様対応など">${e.notes}</textarea>
    </div>
  `;
  $('#main').innerHTML = html;
  bindEntryEvents();
}

function bindEntryEvents(){
  const e = current;
  const bind = (id, field, isTrips)=>{
    const el = $('#'+id);
    if(!el) return;
    el.addEventListener('input', ()=>{ e[field]=el.value; refreshMetersOnly(); });
  };
  bind('f_date','date'); bind('f_weather','weather'); bind('f_driver','driverName'); bind('f_car','carNumber');
  bind('f_start','startTime'); bind('f_end','endTime'); bind('f_startMeter','startMeter'); bind('f_endMeter','endMeter');
  bind('f_breakStart','breakStart'); bind('f_breakEnd','breakEnd'); bind('f_alcohol','alcoholCheck');
  bind('f_cash','cash'); bind('f_card','card'); bind('f_emoney','emoney'); bind('f_ticket','ticket'); bind('f_pickupFee','pickupFee');
  bind('f_fuelAmount','fuelAmount'); bind('f_fuelCost','fuelCost'); bind('f_notes','notes');

  $$('.trip-row').forEach(row=>{
    const i = +row.dataset.i;
    const map = {'.t-pickupTime':'pickupTime','.t-pickupLoc':'pickupLoc','.t-dropTime':'dropTime','.t-dropLoc':'dropLoc','.t-fare':'fare','.t-pay':'pay'};
    Object.keys(map).forEach(sel=>{
      const el = $(sel, row);
      if(!el) return;
      const isSelect = el.tagName === 'SELECT';
      el.addEventListener('input', ()=>{
        e.trips[i][map[sel]] = el.value;
        refreshMetersOnly();
      });
      if(isSelect){
        // selects don't have a text cursor to lose, safe to fully refresh
        el.addEventListener('change', ()=>{ e.trips[i][map[sel]] = el.value; renderEntry(); });
      }
    });
  });
  $$('.del-trip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const i = +btn.dataset.i;
      e.trips.splice(i,1);
      if(e.trips.length===0) e.trips.push(blankTrip());
      renderEntry();
    });
  });
  const addTrip = $('#addTrip');
  if(addTrip) addTrip.addEventListener('click', ()=>{ e.trips.push(blankTrip()); renderEntry(); });

  const fillBtn = $('#fillFromTrips');
  if(fillBtn) fillBtn.addEventListener('click', ()=>{
    e.cash = tripsSumByPay(e,'現金')||'';
    e.card = tripsSumByPay(e,'カード')||'';
    e.emoney = tripsSumByPay(e,'電子マネー')||'';
    e.ticket = tripsSumByPay(e,'チケット')||'';
    e.pickupFee = tripsSumByPay(e,'迎車')||'';
    renderEntry();
  });
}

function refreshMetersOnly(){
  // lightweight update of computed meters without full re-render (keeps focus)
  const dist = totalDistance(current);
  const distEls = $$('.meter .val');
  if(distEls[0]) distEls[0].textContent = dist!==null? dist.toLocaleString('ja-JP') : '--';
  if(distEls[1]) distEls[1].textContent = '¥'+yen(tripsFareSum(current));
  if(distEls[2]) distEls[2].textContent = '¥'+yen(totalRevenue(current));
}

// ---------- render: history ----------
async function renderHistory(){
  $('#main').innerHTML = `<div class="empty">読み込み中...</div>`;
  historyCache = await loadAllEntries();
  if(historyCache.length===0){
    $('#main').innerHTML = `<div class="empty">まだ保存された日報がありません。<br>「入力」タブから記録して保存してください。</div>`;
    return;
  }
  const rows = historyCache.map((e,idx)=>{
    const dist = totalDistance(e);
    return `<div class="history-item" data-idx="${idx}">
      <div>
        <div class="d">${e.date} (${dow(e.date)})</div>
        <div class="m">${e.driverName||'氏名未入力'} ・ ${e.carNumber||'車両未入力'}</div>
      </div>
      <div class="r">
        <div class="amt">¥${yen(totalRevenue(e))}</div>
        <div class="km">${dist!==null?dist.toLocaleString('ja-JP')+' km':''}</div>
      </div>
    </div>`;
  }).join('');
  $('#main').innerHTML = `
    <button class="add-trip" id="exportAll" style="margin-bottom:12px;">📄 全履歴をCSV出力(売上管理シート用)</button>
    ${rows}
  `;
  $('#exportAll').addEventListener('click', exportCSV);
  $$('.history-item').forEach(item=>{
    item.addEventListener('click', ()=> openHistoryModal(+item.dataset.idx));
  });
}

function openHistoryModal(idx){
  const e = historyCache[idx];
  $('#modalTitle').textContent = `${e.date} (${dow(e.date)}) の日報`;
  $('#modalBody').innerHTML = `
    <div style="font-size:13px;color:var(--sub);line-height:1.9;">
      氏名: ${e.driverName||'-'}　車両: ${e.carNumber||'-'}<br>
      出庫 ${e.startTime||'--:--'} → 帰庫 ${e.endTime||'--:--'}<br>
      走行距離: ${totalDistance(e)??'--'} km ／ 乗車件数: ${e.trips.length}件<br>
      売上合計: ¥${yen(totalRevenue(e))}
    </div>
  `;
  $('#modalConfirm').textContent = '削除する';
  $('#modalConfirm').onclick = async ()=>{
    await deleteEntry(e);
    closeModal();
    renderHistory();
    showToast('削除しました');
  };
  $('#modalCancel').onclick = ()=>{
    closeModal();
    current = JSON.parse(JSON.stringify(e));
    setTab('entry');
    showToast('編集モードで読み込みました');
  };
  $('#modalCancel').textContent = 'この日報を編集';
  $('#modalBg').classList.add('show');
}
function closeModal(){ $('#modalBg').classList.remove('show'); }

function exportCSV(){
  const cols = ['日付','曜日','氏名','車両番号','出庫時刻','帰庫時刻','走行距離km','乗車件数','現金','カード','電子マネー','チケット','迎車料金','売上合計','給油量L','給油代','特記事項'];
  const lines = [cols.join(',')];
  historyCache.slice().reverse().forEach(e=>{
    const row = [
      e.date, dow(e.date), e.driverName, e.carNumber, e.startTime, e.endTime,
      totalDistance(e)??'', e.trips.length,
      e.cash||0, e.card||0, e.emoney||0, e.ticket||0, e.pickupFee||0, totalRevenue(e),
      e.fuelAmount||0, e.fuelCost||0, (e.notes||'').replace(/\n/g,' ').replace(/,/g,'、')
    ];
    lines.push(row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  });
  const csv = '\uFEFF'+lines.join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `乗務日報_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSVを出力しました');
}

// ---------- render: summary ----------
async function renderSummary(){
  $('#main').innerHTML = `<div class="empty">読み込み中...</div>`;
  historyCache = await loadAllEntries();
  const [y,m] = summaryMonth.split('-').map(Number);
  const monthEntries = historyCache.filter(e=> e.date.startsWith(summaryMonth));
  const totalRev = monthEntries.reduce((s,e)=>s+totalRevenue(e),0);
  const totalKm = monthEntries.reduce((s,e)=>{const d=totalDistance(e); return s+(d||0);},0);
  const workDays = monthEntries.length;
  const avgRev = workDays? Math.round(totalRev/workDays) : 0;

  $('#main').innerHTML = `
    <div class="month-nav">
      <button id="prevM">‹</button>
      <div class="cur">${y}年 ${m}月</div>
      <button id="nextM">›</button>
    </div>
    <div class="summary-grid">
      <div class="stat"><div class="l">月間売上</div><div class="v">¥${yen(totalRev)}</div></div>
      <div class="stat"><div class="l">乗務日数</div><div class="v green">${workDays}<span class="u"> 日</span></div></div>
      <div class="stat"><div class="l">総走行距離</div><div class="v">${totalKm.toLocaleString('ja-JP')}<span class="u"> km</span></div></div>
      <div class="stat"><div class="l">1日平均売上</div><div class="v green">¥${yen(avgRev)}</div></div>
    </div>
    ${workDays===0? `<div class="empty">この月の記録はまだありません。</div>` :
      monthEntries.map(e=>`<div class="history-item" data-date="${e.date}">
        <div><div class="d">${e.date} (${dow(e.date)})</div><div class="m">${e.carNumber||''}</div></div>
        <div class="r"><div class="amt">¥${yen(totalRevenue(e))}</div></div>
      </div>`).join('')
    }
  `;
  $('#prevM').addEventListener('click', ()=>{ shiftMonth(-1); });
  $('#nextM').addEventListener('click', ()=>{ shiftMonth(1); });
}
function shiftMonth(delta){
  const [y,m] = summaryMonth.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  summaryMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  renderSummary();
}

// ---------- tabs / toast ----------
function setTab(tab){
  activeTab = tab;
  $$('.tabs button').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  $('#saveBar').style.display = tab==='entry' ? 'block' : 'none';
  if(tab==='entry') renderEntry();
  else if(tab==='history') renderHistory();
  else renderSummary();
}
$$('.tabs button').forEach(b=> b.addEventListener('click', ()=> setTab(b.dataset.tab)));

let toastTimer;
function showToast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 1800);
}

$('#modalCancel') && null;
$('#modalBg').addEventListener('click', (ev)=>{ if(ev.target.id==='modalBg') closeModal(); });

$('#saveBtn').addEventListener('click', async ()=>{
  try{
    await saveEntry(current);
    showToast('保存しました ✓');
  }catch(err){
    showToast('保存に失敗しました');
  }
});
$('#newBtn').addEventListener('click', ()=>{
  current = blankEntry();
  renderEntry();
  showToast('新規日報を作成しました');
});

// init
setTab('entry');
</script>
</body>
</html>
