<style>
  :root{
    --bg: #12161f;
    --panel: #1a2030;
    --panel-2: #212a3d;
    --line: #2c3650;
    --text: #eef1f7;
    --sub: #93a0bd;
    --amber: #f2b807;
    --amber-dim: #7a640a;
    --green: #4ade80;
    --red: #f87171;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-tap-highlight-color:transparent;}
  .mono{font-family:"JetBrains Mono","SF Mono",Consolas,monospace; font-variant-numeric: tabular-nums;}

  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  header{padding:16px 16px 12px;position:sticky;top:0;background:linear-gradient(180deg, var(--bg) 82%, transparent);z-index:10;}
  .brand{display:flex;align-items:baseline;gap:8px;}
  .brand .badge{background:var(--amber);color:#1a1400;font-weight:800;font-size:12px;letter-spacing:.06em;
    padding:2px 8px;border-radius:6px;}
  .brand h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.02em;}
  .brand .sub{color:var(--sub);font-size:11.5px;margin-top:2px;}

  nav.tabs{display:flex;gap:4px;margin:12px 0 0;background:var(--panel);border-radius:12px;padding:4px;border:1px solid var(--line);}
  nav.tabs button{flex:1;border:none;background:transparent;color:var(--sub);padding:9px 4px;border-radius:9px;
    font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;}
  nav.tabs button.active{background:var(--amber);color:#1a1400;}

  main{flex:1;padding:14px 14px 0;padding-bottom:100px;}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 13px 15px;margin-bottom:11px;}
  .card h2{font-size:12.5px;color:var(--amber);letter-spacing:.04em;margin:0 0 11px;display:flex;align-items:center;gap:6px;text-transform:uppercase;justify-content:space-between;}
  .card h2 .n{background:var(--panel-2);color:var(--sub);font-size:10px;padding:1px 6px;border-radius:5px;text-transform:none;letter-spacing:0;}
  .card h2 span.t{display:flex;align-items:center;gap:6px;}

  .row{display:flex;gap:9px;margin-bottom:9px;}
  .row > div{flex:1;min-width:0;}
  .row3 > div{flex:1;min-width:0;}
  label{display:block;font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600;}
  input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:9px 10px;font-size:14.5px;outline:none;font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:var(--amber);}
  textarea{resize:vertical;min-height:56px;}

  .meter{background:#0b0e15;border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
  .meter .label{font-size:10.5px;color:var(--sub);font-weight:700;letter-spacing:.03em;}
  .meter .val{font-size:19px;font-weight:700;color:var(--amber);}
  .meter .val.green{color:var(--green);}
  .meter .unit{font-size:11px;color:var(--sub);margin-left:3px;}

  .subgrid{display:grid;grid-template-columns:70px 1fr 1fr 1fr;gap:6px;align-items:center;margin-bottom:6px;}
  .subgrid .h{font-size:10px;color:var(--sub);font-weight:700;text-align:center;}
  .subgrid input{padding:7px 6px;font-size:13px;text-align:center;}
  .subgrid .rowlabel{font-size:11.5px;color:var(--text);font-weight:600;}

  .add-btn{width:100%;margin-top:6px;background:var(--panel-2);border:1px dashed var(--line);color:var(--sub);
    padding:9px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .add-btn:hover{color:var(--amber);border-color:var(--amber-dim);}

  .fill-btn{width:100%;margin-top:8px;background:var(--panel-2);border:1px dashed var(--line);color:var(--sub);
    padding:8px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;}
  .fill-btn:active{color:var(--amber);}

  .payrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px;}
  .payrow:last-child{border-bottom:none;}
  .payrow > span{flex-shrink:0;color:var(--text);}
  .payrow input{width:110px;text-align:right;flex-shrink:0;}

  .trip-card{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;margin-bottom:10px;}
  .trip-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;}
  .trip-head .badge-kubun{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;background:var(--line);color:var(--sub);flex-shrink:0;}
  .trip-head .badge-kubun.k1{background:#3d2f0a;color:var(--amber);}
  .trip-head .badge-kubun.k2{background:#2a3d2f;color:var(--green);}
  .trip-head .badge-kubun.k3{background:#3d2a2a;color:var(--red);}
  .trip-head .summary{flex:1;min-width:0;font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .trip-head .summary .sub{color:var(--sub);font-size:11px;}
  .trip-head .amt{font-size:13.5px;font-weight:700;color:var(--amber);flex-shrink:0;}
  .trip-head .chev{color:var(--sub);flex-shrink:0;transition:.2s;font-size:12px;}
  .trip-head .chev.open{transform:rotate(180deg);}
  .trip-body{padding:4px 12px 13px;border-top:1px solid var(--line);}
  .trip-body .row{margin-top:9px;margin-bottom:0;}
  .trip-body label{margin-top:0;}
  .del-trip{background:var(--panel);border:1px solid var(--line);color:var(--red);font-size:12px;
    padding:8px;border-radius:8px;width:100%;margin-top:10px;font-weight:700;cursor:pointer;}

  .checkfield{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;padding:8px 10px;}
  .checkfield input[type=checkbox]{width:17px;height:17px;flex-shrink:0;accent-color:var(--amber);}
  .checkfield input[type=checkbox]:disabled{opacity:.3;}
  .checkfield span{font-size:12.5px;color:var(--sub);font-weight:600;white-space:nowrap;}

  .fee-warn{background:#3d1f1f;border:1px solid var(--red);color:#ffb3b3;font-size:12px;font-weight:700;
    padding:8px 10px;border-radius:9px;margin-top:9px;}

  .ac-wrap{position:relative;}
  .ac-list{position:absolute;top:100%;left:0;right:0;background:var(--panel-2);border:1px solid var(--line);
    border-radius:9px;max-height:190px;overflow-y:auto;z-index:80;display:none;margin-top:3px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .ac-item{padding:10px 12px;font-size:13.5px;color:var(--text);border-bottom:1px solid var(--line);}
  .ac-item:last-child{border-bottom:none;}
  .ac-item:active{background:var(--panel);}

  .save-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg, var(--bg) 60%, transparent);padding:14px 16px 20px;z-index:20;}
  .save-bar .inner{max-width:640px;margin:0 auto;display:flex;gap:10px;}
  .btn{border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;flex:1;}
  .btn-primary{background:var(--amber);color:#1a1400;}
  .btn-primary:active{transform:scale(.98);}
  .btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line);}

  .history-item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .history-item:active{background:var(--panel-2);}
  .history-item .d{font-weight:800;font-size:14px;}
  .history-item .m{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .history-item .r{text-align:right;}
  .history-item .r .amt{font-size:16px;font-weight:800;color:var(--amber);}

function getKnownPlaces(){
  try{
    const v = localStorage.getItem('nippou:places');
    const arr = v ? JSON.parse(v) : [];
    return Array.from(new Set([...PLACE_SEED, ...arr]));
  }catch(e){ return PLACE_SEED.slice(); }
}
function addKnownPlace(name){
  if(!name || !name.trim()) return;
  name = name.trim();
  try{
    const v = localStorage.getItem('nippou:places');
    const arr = v ? JSON.parse(v) : [];
    if(!arr.includes(name) && !PLACE_SEED.includes(name)){
      arr.push(name);
      localStorage.setItem('nippou:places', JSON.stringify(arr));
      const dl = $('#placesList');
      if(dl){ const opt=document.createElement('option'); opt.value=name; dl.appendChild(opt); }
    }
  }catch(e){}
}
function renderPlacesDatalist(){
  const places = getKnownPlaces();
  return `<datalist id="placesList">${places.map(p=>`<option value="${p.replace(/"/g,'&quot;')}">`).join('')}</datalist>`;
}

// iOSのSafariはdatalistの候補表示に対応していないため、自前の候補リストを実装
function attachAutocomplete(input, listEl, onSelect){
  function showMatches(){
    const q = input.value.trim();
    const places = getKnownPlaces();
    const matches = q ? places.filter(p=>p.includes(q)).slice(0,8) : places.slice(0,8);
    if(matches.length===0){ listEl.style.display='none'; listEl.innerHTML=''; return; }
    listEl.innerHTML = matches.map(m=>`<div class="ac-item">${m.replace(/</g,'&lt;')}</div>`).join('');
    listEl.style.display='block';
  }
  input.addEventListener('input', showMatches);
  input.addEventListener('focus', showMatches);
  input.addEventListener('blur', ()=> setTimeout(()=>{ listEl.style.display='none'; }, 200));
  listEl.addEventListener('touchstart', (ev)=>{
    const item = ev.target.closest('.ac-item');
    if(!item) return;
    ev.preventDefault();
    input.value = item.textContent;
    input.dispatchEvent(new Event('input', {bubbles:true}));
    listEl.style.display='none';
    if(onSelect) onSelect(item.textContent);
  });
  listEl.addEventListener('mousedown', (ev)=>{
    const item = ev.target.closest('.ac-item');
    if(!item) return;
    ev.preventDefault();
    input.value = item.textContent;
    input.dispatchEvent(new Event('input', {bubbles:true}));
    listEl.style.display='none';
    if(onSelect) onSelect(item.textContent);
  });
}

  if(!loc) return null;
  const s = loc.replace(/\s|　/g,'');
  for(const kw of FEE_REQUIRED_KEYWORDS){ if(s.includes(kw.replace(/\s|　/g,''))) return 'required'; }

// ---------- storage (browser localStorage) ----------
async function saveEntry(entry){
  localStorage.setItem('nippou:'+entry.date+'_'+entry.id, JSON.stringify(entry));
}
async function deleteEntry(entry){
  localStorage.removeItem('nippou:'+entry.date+'_'+entry.id);
}
async function loadAllEntries(){
  const out = [];
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf('nippou:')===0){
      try{ const v = localStorage.getItem(k); if(v) out.push(JSON.parse(v)); }catch(e){}
    }
  }
  out.sort((a,b)=> (b.date+b.id).localeCompare(a.date+a.id));
  return out;
}

// ---------- derived calculations ----------
function totalDistance(e){
  const s=parseFloat(e.startMeter), en=parseFloat(e.endMeter);
  if(isNaN(s)||isNaN(en)) return null;
  return Math.max(0, en-s);
}
function tripsSum(e, filterFn){
  return e.trips.filter(filterFn).reduce((s,t)=> s+num(t.amount), 0);
}
function sumField(e, field){
  return e.trips.reduce((s,t)=> s+num(t[field]), 0);
}
function shunyuGenkin(e){ return tripsSum(e, t=>t.shuKind==='現収'); }
function shunyuMishu(e){ return tripsSum(e, t=>t.shuKind==='未収'); }
function shunyuGoukei(e){ return num(e.shunyu.genkin) + num(e.shunyu.mishu); }
function daikoGenshu(e){ return tripsSum(e, t=>t.kubun==='3' && t.shuKind==='現収'); }
function daikoMishu(e){ return tripsSum(e, t=>t.kubun==='3' && t.shuKind==='未収'); }
function mukaeSum(e){ return tripsSum(e, t=>t.mukae); }
function kashikiriSum(e){ return tripsSum(e, t=>t.kubun==='1'); }
function enkyoriSum(e){ return sumField(e,'enkyori'); }
function tatekaeSum(e){ return sumField(e,'tatekae'); }
function shintaiSum(e, kind){ return e.trips.filter(t=>t.shintaiKind===kind).reduce((s,t)=>s+num(t.shintaiAmount),0); }
function eigyoShunyuGoukei(e){
  const s = e.eigyoShunyu;
  return num(s.hatsunori)+num(s.kasan)+num(s.mukaeRyokin)+num(s.kashikiri)+num(s.meterGai)-num(s.enkyori)-num(s.karatenGaku);
}
function noukingaku(e){
  const n = e.noukin;
  return num(n.genkin) + num(n.daikoGenkin) - num(n.shintaiGaku) - num(n.koureiGaku) - num(n.tatekae);
}

        <div><label>迎車空転</label><input type="number" inputmode="numeric" id="f_karatenMukae" value="${e.karaten.mukae}" placeholder="0"></div>

        <div><label>金額</label><input type="number" inputmode="decimal" id="f_etcKingaku" value="${e.etc.kingaku}" placeholder="0"></div>

      <h2><span class="t">特記事項</span></h2>

  $('#main').innerHTML = html;
  bindEntryEvents();
}

function kubunLabel(k){ return k==='1'?'貸切':k==='2'?'その他':k==='3'?'代行':''; }

function renderTripCard(t, i){
  const kclass = t.kubun ? 'k'+t.kubun : '';
  const locSummary = [t.pickupLoc, t.dropLoc].filter(Boolean).join(' → ') || '場所未入力';
  const timeSummary = [t.pickupTime, t.dropTime].filter(Boolean).join('〜');
  const feeStatus = getFeeStatus(t.pickupLoc);
  if(feeStatus==='free' && t.mukae) t.mukae = false;
  return `
    <div class="trip-card" data-i="${i}">
      <div class="trip-head" data-toggle="${i}">
        ${t.kubun ? `<span class="badge-kubun ${kclass}">${kubunLabel(t.kubun)}</span>` : ''}
        <div class="summary">
          <div>${locSummary}</div>
          <div class="sub">${timeSummary||'時刻未入力'}${t.mukae?' ・迎車':''}${t.shuKind==='未収'?' ・未収':''}</div>
        </div>
        <div class="amt">${t.amount?'¥'+yen(t.amount):''}</div>
        <div class="chev ${t.open?'open':''}">▾</div>
      </div>
      <div class="trip-body" style="display:${t.open?'block':'none'}">
        <div class="row">
          <div><label>区分</label>
            <select class="t_kubun">
              <option value="" ${t.kubun===''?'selected':''}>通常</option>
              <option value="1" ${t.kubun==='1'?'selected':''}>1 貸切</option>
              <option value="2" ${t.kubun==='2'?'selected':''}>2 その他</option>
              <option value="3" ${t.kubun==='3'?'selected':''}>3 代行</option>
            </select>
          </div>
          <div><label>人数</label><input type="number" inputmode="numeric" class="t_pax" value="${t.pax}" placeholder="1"></div>
        </div>
        <div class="row">
          <div><label>乗車時刻</label><input type="time" class="t_pickupTime" value="${t.pickupTime}"></div>
          <div><label>降車時刻</label><input type="time" class="t_dropTime" value="${t.dropTime}"></div>
        </div>
        <div class="row"><div class="ac-wrap"><label>乗車地</label><input type="text" class="t_pickupLoc" autocomplete="off" value="${t.pickupLoc}" placeholder="乗車地(候補から選択 or 入力)"><div class="ac-list" data-field="pickupLoc"></div></div></div>
        <div class="row"><div class="ac-wrap"><label>立寄地 or 待機時間</label><input type="text" class="t_waitInfo" autocomplete="off" value="${t.waitInfo}" placeholder="立寄地・待機時間"><div class="ac-list" data-field="waitInfo"></div></div></div>
        <div class="row"><div class="ac-wrap"><label>降車地</label><input type="text" class="t_dropLoc" autocomplete="off" value="${t.dropLoc}" placeholder="降車地(候補から選択 or 入力)"><div class="ac-list" data-field="dropLoc"></div></div></div>
        <div class="fee-warn" style="display:${feeStatus==='free'?'block':'none'}">⚠ この場所は迎車料金を受け取れません</div>
        <div class="row">
          <div class="checkfield"><input type="checkbox" class="t_mukae" ${t.mukae?'checked':''} ${feeStatus==='free'?'disabled':''}><span>迎車${feeStatus==='required'?' (対象)':''}</span></div>
          <div><select class="t_shuKind"><option ${t.shuKind==='現収'?'selected':''}>現収</option><option ${t.shuKind==='未収'?'selected':''}>未収</option></select></div>
        </div>
        <div class="row"><div><label>金額</label><input type="number" inputmode="decimal" class="t_amount" value="${t.amount}" placeholder="0"></div></div>
        <div class="row">
          <div><label>立替金額</label><input type="number" inputmode="decimal" class="t_tatekae" value="${t.tatekae}" placeholder="0"></div>
          <div><label>遠距離割引</label><input type="number" inputmode="decimal" class="t_enkyori" value="${t.enkyori}" placeholder="0"></div>
        </div>
        <div class="row">
          <div><label>身障・高齢割引</label>
            <select class="t_shintaiKind">
              <option value="" ${t.shintaiKind===''?'selected':''}>なし</option>
              <option value="身" ${t.shintaiKind==='身'?'selected':''}>身障</option>
              <option value="高" ${t.shintaiKind==='高'?'selected':''}>高齢</option>
            </select>
          </div>
          <div><label>割引額</label><input type="number" inputmode="decimal" class="t_shintaiAmount" value="${t.shintaiAmount}" placeholder="0"></div>
        </div>
        <div class="row"><div><label>決済方法</label>
          <select class="t_paymentType">
            ${['現金','自社','助成券','共通券','クレジット','QR決済'].map(p=>`<option ${t.paymentType===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div></div>
        <div class="row"><div><label>メモ(チケット番号・顧客名・貸切km・人数・定額等)</label><input type="text" class="t_memo" value="${t.memo}" placeholder="メモ"></div></div>
        <button class="del-trip" data-del="${i}">この乗車記録を削除</button>
      </div>
    </div>
  `;
}

function bindEntryEvents(){
  const e = current;
  const bindTop = (id, path)=>{
    const el = $('#'+id);
    if(!el) return;
    el.addEventListener('input', ()=>{ setPath(e, path, el.value); refreshMeters(); });
  };
  bindTop('f_date','date'); bindTop('f_weather','weather'); bindTop('f_driver','driverName');
  bindTop('f_eigyosho','eigyosho'); bindTop('f_car','carNumber');
  bindTop('f_start','startTime'); bindTop('f_end','endTime');
  bindTop('f_startMeter','startMeter'); bindTop('f_endMeter','endMeter');
  bindTop('f_alcohol','alcoholCheck');
  bindTop('f_lpg','fuel.lpg'); bindTop('f_keiyu','fuel.keiyu'); bindTop('f_gasoline','fuel.gasoline');
  bindTop('f_karatenEigyo','karaten.eigyo'); bindTop('f_karatenJigo','karaten.jigo'); bindTop('f_karatenMukae','karaten.mukae');
  bindTop('f_shunyuGenkin','shunyu.genkin'); bindTop('f_shunyuMishu','shunyu.mishu');
  bindTop('f_daikoGenshu','daiko.genshu'); bindTop('f_daikoMishu','daiko.mishu');
  bindTop('f_hatsunori','eigyoShunyu.hatsunori'); bindTop('f_kasan','eigyoShunyu.kasan');
  bindTop('f_mukaeRyokin','eigyoShunyu.mukaeRyokin'); bindTop('f_kashikiri','eigyoShunyu.kashikiri');
  bindTop('f_meterGai','eigyoShunyu.meterGai'); bindTop('f_eigyoEnkyori','eigyoShunyu.enkyori');
  bindTop('f_karatenGaku','eigyoShunyu.karatenGaku');
  bindTop('f_noukinGenkin','noukin.genkin'); bindTop('f_noukinDaiko','noukin.daikoGenkin');
  bindTop('f_noukinShintai','noukin.shintaiGaku'); bindTop('f_noukinKourei','noukin.koureiGaku');
  bindTop('f_noukinTatekae','noukin.tatekae'); bindTop('f_kabusoku','noukin.kabusoku');
  bindTop('f_etcKaisu','etc.kaisu'); bindTop('f_etcKingaku','etc.kingaku');
  bindTop('f_notes','notes');

  // 営業回数記録 subgrid
  ['nyuko','shukko','chosei','kei'].forEach(key=>{
    ['eigyo','jigo','mukae'].forEach(col=>{
      const el = $('.k_'+key+'_'+col);
      if(!el) return;
      el.addEventListener('input', ()=>{
        e.kaisu[key][col] = el.value;
        if(key==='nyuko' || key==='shukko') updateKeiField(col);
      });
    });
  });

  // breaks
  $$('.row[data-break-i]').forEach(row=>{
    const i = +row.dataset.breakI;
    const s = $('.b_start', row), en = $('.b_end', row);
    if(s) s.addEventListener('input', ()=>{ e.breaks[i].start = s.value; });
    if(en) en.addEventListener('input', ()=>{ e.breaks[i].end = en.value; });
  });
  const addBreak = $('#addBreak');
  if(addBreak) addBreak.addEventListener('click', ()=>{ e.breaks.push({start:'',end:''}); renderEntry(); });

  // trips
  bindTripEvents();
  const addTrip = $('#addTrip');
  if(addTrip) addTrip.addEventListener('click', ()=>{ e.trips.forEach(t=>t.open=false); e.trips.push(blankTrip()); renderEntry(); });

  // fill buttons
  const fillShunyu = $('#fillShunyu');
  if(fillShunyu) fillShunyu.addEventListener('click', ()=>{
    e.shunyu.genkin = shunyuGenkin(e)||''; e.shunyu.mishu = shunyuMishu(e)||''; renderEntry();
  });
  const fillDaiko = $('#fillDaiko');
  if(fillDaiko) fillDaiko.addEventListener('click', ()=>{
    e.daiko.genshu = daikoGenshu(e)||''; e.daiko.mishu = daikoMishu(e)||''; renderEntry();
  });
  const fillEigyoShunyu = $('#fillEigyoShunyu');
  if(fillEigyoShunyu) fillEigyoShunyu.addEventListener('click', ()=>{
    e.eigyoShunyu.mukaeRyokin = mukaeSum(e)||'';
    e.eigyoShunyu.kashikiri = kashikiriSum(e)||'';
    e.eigyoShunyu.enkyori = enkyoriSum(e)||'';
    renderEntry();
  });
  const fillNoukin = $('#fillNoukin');
  if(fillNoukin) fillNoukin.addEventListener('click', ()=>{
    e.noukin.genkin = shunyuGenkin(e)||'';
    e.noukin.daikoGenkin = daikoGenshu(e)||'';
    e.noukin.shintaiGaku = shintaiSum(e,'身')||'';
    e.noukin.koureiGaku = shintaiSum(e,'高')||'';
    e.noukin.tatekae = tatekaeSum(e)||'';
    renderEntry();
  });
}

function setPath(obj, path, value){
  const parts = path.split('.');
  let o = obj;
  for(let i=0;i<parts.length-1;i++) o = o[parts[i]];
  o[parts[parts.length-1]] = value;
}

function updateKeiField(col){
  const e = current;
  const nyuko = num(e.kaisu.nyuko[col]);
  const shukko = num(e.kaisu.shukko[col]);
  const kei = nyuko - shukko;
  e.kaisu.kei[col] = kei;
  const el = $('.k_kei_'+col);
  if(el) el.value = kei;
}

function bindTripEvents(){
  const e = current;
  $$('.trip-card').forEach(card=>{
    const i = +card.dataset.i;
    const t = e.trips[i];

    const head = $('.trip-head', card);
    if(head) head.addEventListener('click', ()=>{ t.open = !t.open; renderEntry(); });

    const fieldMap = {
      '.t_kubun':'kubun', '.t_pax':'pax', '.t_pickupTime':'pickupTime', '.t_dropTime':'dropTime',
      '.t_pickupLoc':'pickupLoc', '.t_waitInfo':'waitInfo', '.t_dropLoc':'dropLoc',
      '.t_shuKind':'shuKind', '.t_amount':'amount', '.t_tatekae':'tatekae', '.t_enkyori':'enkyori',
      '.t_shintaiKind':'shintaiKind', '.t_shintaiAmount':'shintaiAmount', '.t_paymentType':'paymentType', '.t_memo':'memo'
    };
    Object.keys(fieldMap).forEach(sel=>{
      const el = $(sel, card);
      if(!el) return;
      const isSelect = el.tagName === 'SELECT';
      el.addEventListener('input', ()=>{ t[fieldMap[sel]] = el.value; refreshMeters(); });
      if(isSelect){
        el.addEventListener('change', ()=>{ t[fieldMap[sel]] = el.value; renderEntry(); });
      }
    });
    const mukaeEl = $('.t_mukae', card);
    if(mukaeEl) mukaeEl.addEventListener('change', ()=>{ t.mukae = mukaeEl.checked; renderEntry(); });

    ['.t_pickupLoc','.t_waitInfo','.t_dropLoc'].forEach(sel=>{
      const el = $(sel, card);
      if(el) el.addEventListener('blur', ()=>{
        addKnownPlace(el.value);
        if(sel==='.t_pickupLoc') refreshTripFeeStatus(i);
      });
    });

    const acFieldMap = {'.t_pickupLoc':'pickupLoc', '.t_waitInfo':'waitInfo', '.t_dropLoc':'dropLoc'};
    Object.keys(acFieldMap).forEach(sel=>{
      const el = $(sel, card);
      const wrap = el ? el.closest('.ac-wrap') : null;
      const listEl = wrap ? $('.ac-list', wrap) : null;
      if(!el || !listEl) return;
      attachAutocomplete(el, listEl, (value)=>{
        t[acFieldMap[sel]] = value;
        addKnownPlace(value);
        if(sel==='.t_pickupLoc') refreshTripFeeStatus(i);
      });
    });

    const delBtn = $('[data-del]', card);
    if(delBtn) delBtn.addEventListener('click', ()=>{
      e.trips.splice(i,1);
      if(e.trips.length===0) e.trips.push(blankTrip());
      renderEntry();
    });
  });
}

function refreshMeters(){
  const e = current;
  const dist = totalDistance(e);
  const mDist = $('#m_dist'); if(mDist) mDist.textContent = dist!==null? dist.toLocaleString('ja-JP') : '--';
  const mShunyu = $('#m_shunyuGoukei'); if(mShunyu) mShunyu.textContent = '¥'+yen(shunyuGoukei(e));
  const mEigyo = $('#m_eigyoGoukei'); if(mEigyo) mEigyo.textContent = '¥'+yen(eigyoShunyuGoukei(e));
  const mNoukin = $('#m_noukingaku'); if(mNoukin) mNoukin.textContent = '¥'+yen(noukingaku(e));
}

function refreshTripFeeStatus(i){
  const t = current.trips[i];
  if(!t) return;
  const feeStatus = getFeeStatus(t.pickupLoc);
  if(feeStatus==='free' && t.mukae) t.mukae = false;
  const card = $(`.trip-card[data-i="${i}"]`);
  if(!card) return;
  const warn = $('.fee-warn', card);
  if(warn) warn.style.display = feeStatus==='free' ? 'block' : 'none';
  const cb = $('.t_mukae', card);
  if(cb){ cb.disabled = feeStatus==='free'; cb.checked = t.mukae; }
  const label = $('.checkfield span', card);
  if(label) label.textContent = '迎車' + (feeStatus==='required' ? ' (対象)' : '');
}

// ---------- render: history ----------
async function renderHistory(){
  $('#main').innerHTML = `<div class="empty">読み込み中...</div>`;
  historyCache = await loadAllEntries();
  if(historyCache.length===0){
    $('#main').innerHTML = `<div class="empty">まだ保存された日報がありません。<br>「入力」タブから記録して保存してください。</div>`;
    return;
  }
  const rows = historyCache.map((e,idx)=>{
    const dist = totalDistance(e);
    return `<div class="history-item" data-idx="${idx}">
      <div>
        <div class="d">${e.date} (${dow(e.date)})</div>
        <div class="m">${e.driverName||'氏名未入力'} ・ ${e.carNumber||'車両未入力'}</div>
      </div>
      <div class="r">
        <div class="amt">¥${yen(shunyuGoukei(e))}</div>
        <div class="km">${dist!==null?dist.toLocaleString('ja-JP')+' km':''}</div>
      </div>
    </div>`;
  }).join('');
  $('#main').innerHTML = `
    <button class="add-btn" id="exportAll" style="margin-bottom:12px;">📄 全履歴をCSV出力(手書き参照用)</button>
    ${rows}
  `;
  $('#exportAll').addEventListener('click', exportCSV);
  $$('.history-item').forEach(item=>{
    item.addEventListener('click', ()=> openHistoryModal(+item.dataset.idx));
  });
}

function openHistoryModal(idx){
  const e = historyCache[idx];
  $('#modalTitle').textContent = `${e.date} (${dow(e.date)}) の日報`;
  $('#modalBody').innerHTML = `
    <div style="font-size:13px;color:var(--sub);line-height:1.9;">
      氏名: ${e.driverName||'-'}　車両: ${e.carNumber||'-'}<br>
      出庫 ${e.startTime||'--:--'} → 帰庫 ${e.endTime||'--:--'}<br>
      走行距離: ${totalDistance(e)??'--'} km ／ 乗車件数: ${e.trips.length}件<br>
      収入金合計: ¥${yen(shunyuGoukei(e))}<br>
      納金額(目安): ¥${yen(noukingaku(e))}
    </div>
  `;
  $('#modalConfirm').textContent = '削除する';
  $('#modalConfirm').onclick = async ()=>{
    await deleteEntry(e);
    closeModal();
    renderHistory();
    showToast('削除しました');
  };
  $('#modalCancel').onclick = ()=>{
    closeModal();
    current = JSON.parse(JSON.stringify(e));
    setTab('entry');
    showToast('編集モードで読み込みました');
  };
  $('#modalCancel').textContent = 'この日報を編集';
  $('#modalBg').classList.add('show');
}
function closeModal(){ $('#modalBg').classList.remove('show'); }

function exportCSV(){
  const cols = ['日付','曜日','氏名','車両番号','営業所名','出庫時刻','帰庫時刻','始業メーター','終業メーター','走行距離km',
    '乗車件数','現金収入','未収金','収入金合計','代行現収','代行未収','初乗運賃','加算運賃','迎車料金','貸切収入','メーター外収入',
    '遠距離割引','空転','営業収入合計','現収身障者割','現収高齢者割','立替金','納金額目安','過不足金','ETC回数','ETC金額',
    'LPG','軽油','ガソリン','特記事項'];
  const lines = [cols.join(',')];
  historyCache.slice().reverse().forEach(e=>{
    const row = [
      e.date, dow(e.date), e.driverName, e.carNumber, e.eigyosho, e.startTime, e.endTime,
      e.startMeter, e.endMeter, totalDistance(e)??'',
      e.trips.length, e.shunyu.genkin||0, e.shunyu.mishu||0, shunyuGoukei(e),
      e.daiko.genshu||0, e.daiko.mishu||0,
      e.eigyoShunyu.hatsunori||0, e.eigyoShunyu.kasan||0, e.eigyoShunyu.mukaeRyokin||0, e.eigyoShunyu.kashikiri||0, e.eigyoShunyu.meterGai||0,
      e.eigyoShunyu.enkyori||0, e.eigyoShunyu.karatenGaku||0, eigyoShunyuGoukei(e),
      e.noukin.shintaiGaku||0, e.noukin.koureiGaku||0, e.noukin.tatekae||0, noukingaku(e), e.noukin.kabusoku||0,
      e.etc.kaisu||0, e.etc.kingaku||0,
      e.fuel.lpg||0, e.fuel.keiyu||0, e.fuel.gasoline||0,
      (e.notes||'').replace(/\n/g,' ').replace(/,/g,'、')
    ];
    lines.push(row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  });
  const csv = '\uFEFF'+lines.join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `乗務日報_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSVを出力しました');
}

// ---------- render: summary ----------
async function renderSummary(){
  $('#main').innerHTML = `<div class="empty">読み込み中...</div>`;
  historyCache = await loadAllEntries();
  const [y,m] = summaryMonth.split('-').map(Number);
  const monthEntries = historyCache.filter(e=> e.date.startsWith(summaryMonth));
  const totalRev = monthEntries.reduce((s,e)=>s+shunyuGoukei(e),0);
  const totalKm = monthEntries.reduce((s,e)=>{const d=totalDistance(e); return s+(d||0);},0);
  const workDays = monthEntries.length;
  const avgRev = workDays? Math.round(totalRev/workDays) : 0;

  $('#main').innerHTML = `
    <div class="month-nav">
      <button id="prevM">‹</button>
      <div class="cur">${y}年 ${m}月</div>
      <button id="nextM">›</button>
    </div>
    <div class="summary-grid">
      <div class="stat"><div class="l">月間収入金合計</div><div class="v">¥${yen(totalRev)}</div></div>
      <div class="stat"><div class="l">乗務日数</div><div class="v green">${workDays}<span class="u"> 日</span></div></div>
      <div class="stat"><div class="l">総走行距離</div><div class="v">${totalKm.toLocaleString('ja-JP')}<span class="u"> km</span></div></div>
      <div class="stat"><div class="l">1日平均収入</div><div class="v green">¥${yen(avgRev)}</div></div>
    </div>
    ${workDays===0? `<div class="empty">この月の記録はまだありません。</div>` :
      monthEntries.map(e=>`<div class="history-item" data-date="${e.date}">
        <div><div class="d">${e.date} (${dow(e.date)})</div><div class="m">${e.carNumber||''}</div></div>
        <div class="r"><div class="amt">¥${yen(shunyuGoukei(e))}</div></div>
      </div>`).join('')
    }
  `;
  $('#prevM').addEventListener('click', ()=>{ shiftMonth(-1); });
  $('#nextM').addEventListener('click', ()=>{ shiftMonth(1); });
}
function shiftMonth(delta){
  const [y,m] = summaryMonth.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  summaryMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  renderSummary();
}

// ---------- tabs / toast ----------
function setTab(tab){
  activeTab = tab;
  $$('.tabs button').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  $('#saveBar').style.display = tab==='entry' ? 'block' : 'none';
  if(tab==='entry') renderEntry();
  else if(tab==='history') renderHistory();
  else renderSummary();
}
$$('.tabs button').forEach(b=> b.addEventListener('click', ()=> setTab(b.dataset.tab)));

let toastTimer;
function showToast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2000);
}

$('#modalBg').addEventListener('click', (ev)=>{ if(ev.target.id==='modalBg') closeModal(); });

$('#saveBtn').addEventListener('click', async ()=>{
  try{
    await saveEntry(current);
    showToast('保存しました ✓');
  }catch(err){
    showToast('保存に失敗しました');
  }
});
$('#newBtn').addEventListener('click', ()=>{
  current = blankEntry();
  renderEntry();
  showToast('新規日報を作成しました');
});

setTab('entry');

</script>
